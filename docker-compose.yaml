services:
  battleship:
    container_name: battleship
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "1990:1990"
    environment:
      PORT: "1990"
      DB_PATH: /data/battleship.db
      STATIC_DIR: /app/public
    volumes:
      - battleship_data:/data

volumes:
  battleship_data:

networks:
  traefik:
    external: true
